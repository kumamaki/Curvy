name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: brew install xcodegen create-dmg

      - name: Download Sparkle tools
        id: sparkle
        run: |
          SPARKLE_VERSION="2.9.1"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o sparkle.tar.xz
          mkdir -p sparkle-tools
          tar -xJf sparkle.tar.xz -C sparkle-tools
          echo "bin=$PWD/sparkle-tools/bin" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ vars.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build DMG (signing disabled — re-enable after accepting Apple agreement)
        env:
          OUT_DMG: dist/Curvy-${{ steps.version.outputs.version }}.dmg
          VOLNAME: Curvy ${{ steps.version.outputs.version }}
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ steps.version.outputs.version }}
          CODE_SIGN: "no"
        run: ./scripts/build-dmg.sh

      - name: Fetch canonical appcast from releases branch
        run: |
          if git fetch origin releases 2>/dev/null && git show-ref --quiet refs/remotes/origin/releases; then
            git checkout origin/releases -- appcast.xml 2>/dev/null || true
          fi

      - name: Update appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          ./scripts/update-appcast.sh \
            "${{ steps.sparkle.outputs.bin }}" \
            "${{ steps.version.outputs.version }}" \
            "dist/Curvy-${{ steps.version.outputs.version }}.dmg"

      - name: Publish appcast.xml to releases branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp appcast.xml /tmp/generated-appcast.xml
          if git show-ref --quiet refs/remotes/origin/releases; then
            git checkout -f origin/releases -B releases
          else
            git checkout --orphan releases
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp /tmp/generated-appcast.xml appcast.xml
          git add appcast.xml
          git commit -m "chore: update appcast for v${{ steps.version.outputs.version }}"
          git push origin releases

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Curvy ${{ steps.version.outputs.version }}" \
            --generate-notes \
            "dist/Curvy-${{ steps.version.outputs.version }}.dmg"
