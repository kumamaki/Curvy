name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: brew install xcodegen create-dmg

      - name: Download Sparkle tools
        id: sparkle
        run: |
          SPARKLE_VERSION="2.9.1"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o sparkle.tar.xz
          mkdir -p sparkle-tools
          tar -xJf sparkle.tar.xz -C sparkle-tools
          echo "bin=$PWD/sparkle-tools/bin" >> "$GITHUB_OUTPUT"

      - name: Build Release DMG (unsigned, styled install window)
        env:
          OUT_DMG: dist/Curvy-${{ steps.version.outputs.version }}.dmg
          VOLNAME: Curvy ${{ steps.version.outputs.version }}
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ steps.version.outputs.version }}
          CODE_SIGN: "no"
        run: ./scripts/build-dmg.sh

      - name: Update appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          ./scripts/update-appcast.sh \
            "${{ steps.sparkle.outputs.bin }}" \
            "${{ steps.version.outputs.version }}" \
            "dist/Curvy-${{ steps.version.outputs.version }}.dmg"

      - name: Commit appcast.xml to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast for v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Curvy ${{ steps.version.outputs.version }}" \
            --generate-notes \
            "dist/Curvy-${{ steps.version.outputs.version }}.dmg"
